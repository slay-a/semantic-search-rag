# Base Streamlit theme — ZenRag: a warm, dark, ember-orange theme.
[theme]
base = "dark"
primaryColor = "#f97316"
backgroundColor = "#0c0c0e"
secondaryBackgroundColor = "#16151a"
textColor = "#f3f1ee"
font = "sans serif"

[server]
headless = true

[client]
# Don't dump Python tracebacks into the browser (looks bad in a demo). The app
# still shows friendly st.error/st.warning messages for handled cases.
showErrorDetails = "none"
toolbarMode = "minimal"
