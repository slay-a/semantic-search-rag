# Local one-command deploy: Postgres+pgvector + the Streamlit RAG app.
#
#   cp .env.example .env      # set OPENAI_API_KEY
#   docker compose up --build
#   open http://localhost:8501
#
# The app auto-creates its table on first ingest, so there is no manual schema step.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your .env}
      RAG_STORE_BACKEND: pgvector
      DATABASE_URL: postgresql://rag:ragpass@db:5432/rag
      # Optional overrides:
      RAG_HYBRID: ${RAG_HYBRID:-true}
      RAG_RERANK: ${RAG_RERANK:-true}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
